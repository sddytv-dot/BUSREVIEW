<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>경기도 시내버스 도민서비스 평가단</title>

<style>
body{
    font-family: "Malgun Gothic", sans-serif;
    background:#f5f5f5;
    margin:0;
}

.container{
    max-width:900px;
    margin:auto;
    background:white;
    padding:30px;
}

h1{
    text-align:center;
    color:#005BAC;
}

.section{
    margin-top:25px;
    padding:20px;
    border:1px solid #ddd;
    border-radius:10px;
}

label{
    display:block;
    margin-top:10px;
    font-weight:bold;
}

input, textarea, select{
    width:100%;
    padding:10px;
    margin-top:5px;
    box-sizing:border-box;
}

.rating{
    display:flex;
    gap:15px;
    margin-top:10px;
}

.rating label{
    font-weight:normal;
}

button{
    width:100%;
    padding:15px;
    background:#005BAC;
    color:white;
    border:none;
    border-radius:10px;
    font-size:18px;
    cursor:pointer;
}

button:hover{
    opacity:0.9;
}
</style>
</head>

<body>

<div class="container">

<h1>2026 경기도 시내버스 도민서비스 평가단</h1>

<form id="evaluationForm">

<div class="section">
<h2>평가자 정보</h2>

<label>평가자명</label>
<input type="text" required>

<label>디스코드 닉네임</label>
<input type="text" required>

<label>평가일자</label>
<input type="date">
</div>

<div class="section">
<h2>차량 정보</h2>

<label>운영업체</label>
<input type="text">

<label>노선번호</label>
<input type="text">

<label>차량번호</label>
<input type="text">
</div>

<div class="section">
<h2>쾌적성</h2>

<label>좌석 및 시트</label>
<select>
<option>1</option>
<option>2</option>
<option>3</option>
<option>4</option>
<option>5</option>
</select>

<label>천장·바닥·측면</label>
<select>
<option>1</option>
<option>2</option>
<option>3</option>
<option>4</option>
<option>5</option>
</select>

<label>실내온도</label>
<select>
<option>1</option>
<option>2</option>
<option>3</option>
<option>4</option>
<option>5</option>
</select>

<label>차량 내 악취</label>
<select>
<option>1</option>
<option>2</option>
<option>3</option>
<option>4</option>
<option>5</option>
</select>

<label>평가내용</label>
<textarea rows="5"></textarea>
</div>

<div class="section">
<h2>친절성</h2>

<label>승객 질문 응대</label>
<select>
<option>1</option>
<option>2</option>
<option>3</option>
<option>4</option>
<option>5</option>
</select>

<label>교통약자 배려</label>
<select>
<option>1</option>
<option>2</option>
<option>3</option>
<option>4</option>
<option>5</option>
</select>

<label>평가내용</label>
<textarea rows="5"></textarea>
</div>

<div class="section">
<h2>안전성</h2>

<label>급출발 횟수</label>
<input type="number" min="0">

<label>급제동 횟수</label>
<input type="number" min="0">

<label>급회전 횟수</label>
<input type="number" min="0">

<label>급차로변경 횟수</label>
<input type="number" min="0">

<label>신호위반 횟수</label>
<input type="number" min="0">

<label>평가내용</label>
<textarea rows="5"></textarea>
</div>

<div class="section">
<h2>전반적 만족도</h2>

<label>만족도 (0~10)</label>
<input type="range" min="0" max="10">

<label>평가내용</label>
<textarea rows="5"></textarea>
</div>

<div class="section">
<label>
<input type="checkbox" required>
본인은 실제 탑승 후 평가하였음을 확인합니다.
</label>
</div>

<button type="submit">제출하기</button>

</form>

</div>

<script>

document.getElementById("evaluationForm")
.addEventListener("submit", function(e){

e.preventDefault();

alert("평가가 제출되었습니다.");

});

</script>

</body>
</html>
